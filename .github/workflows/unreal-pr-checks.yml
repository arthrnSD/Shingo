# Vérifications légères avant merge (sans installation d'Unreal sur le runner).
# Projet: LudumDare59 (UE 5.6), principalement contenu + Blueprints.

name: CI — Projet Unreal (sanity)

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-unreal-sanity:
    name: Valider .uproject et Config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Vérification Python (stdlib)
        run: python3 scripts/ci/validate_unreal_repo.py

      - name: Analyse des binaires sur la PR (avertissements)
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: python3 scripts/ci/validate_unreal_repo.py --pr-assets

